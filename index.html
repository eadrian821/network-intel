<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AK / Network Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#0A0A0E;
  --surface:#0F0F15;
  --surface2:#14141C;
  --surface3:#1A1A26;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#E8E8F0;
  --text2:#7878A0;
  --text3:#3A3A58;
  --cyan:#00E5FF;
  --magenta:#FF00C8;
  --gold:#FFD700;
  --electric:#4D79FF;
  --green:#00FF88;
  --orange:#FF6B35;
  --mono:'JetBrains Mono',monospace;
  --sans:'Space Grotesk',sans-serif;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--sans);
}

/* ─── LOADER ─────────────────────────────────────────────── */
#loader{
  position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
}
.loader-title{
  font-family:var(--mono);font-size:12px;letter-spacing:.3em;
  color:var(--cyan);text-transform:uppercase;opacity:.8;
}
.loader-bar-wrap{width:220px;height:1px;background:rgba(255,255,255,.06);}
.loader-bar{height:1px;background:linear-gradient(90deg,var(--cyan),var(--magenta));
  animation:lbar 2s ease-in-out infinite;}
@keyframes lbar{0%{width:0;margin-left:0}60%{width:100%}100%{width:0;margin-left:100%}}
.loader-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.1em;}

/* ─── APP SHELL ──────────────────────────────────────────── */
#app{
  display:flex;width:100vw;height:100vh;
  opacity:0;transition:opacity .6s;
}
#app.ready{opacity:1;}

/* ─── CANVAS AREA ────────────────────────────────────────── */
#canvas-area{flex:1;position:relative;overflow:hidden;}

#main-svg{width:100%;height:100%;display:block;}

/* ─── TOP BAR ────────────────────────────────────────────── */
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:40;
  height:52px;display:flex;align-items:center;gap:12px;padding:0 20px;
  background:linear-gradient(180deg,rgba(10,10,14,0.98) 70%,transparent);
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:var(--mono);font-size:11px;letter-spacing:.2em;
  color:var(--cyan);text-transform:uppercase;white-space:nowrap;
  padding-right:16px;border-right:1px solid var(--border2);flex-shrink:0;
}
.logo span{color:var(--text3);}

/* Filter pills */
#filter-pills{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1;}
#filter-pills::-webkit-scrollbar{display:none;}
.fpill{
  padding:3px 11px;border-radius:20px;font-size:9px;font-weight:500;
  letter-spacing:.07em;border:1px solid var(--border2);cursor:pointer;
  transition:all .2s;font-family:var(--mono);text-transform:uppercase;
  background:transparent;color:var(--text3);white-space:nowrap;flex-shrink:0;
}
.fpill:hover{color:var(--text2);}
.fpill.on{color:var(--bg);font-weight:600;}
.fpill[data-cat="us"].on{background:var(--electric);border-color:var(--electric);box-shadow:0 0 12px rgba(77,121,255,.4);}
.fpill[data-cat="am"].on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.4);}
.fpill[data-cat="kb"].on{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(0,255,136,.4);}
.fpill[data-cat="iv"].on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,.4);}
.fpill[data-cat="co"].on{background:var(--magenta);border-color:var(--magenta);box-shadow:0 0 12px rgba(255,0,200,.4);}
.fpill[data-cat="po"].on{background:var(--orange);border-color:var(--orange);box-shadow:0 0 12px rgba(255,107,53,.4);}
.fpill[data-cat="all"].on{background:var(--text2);border-color:var(--text2);}

#top-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tbtn{
  padding:5px 13px;border-radius:4px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-size:9px;cursor:pointer;
  font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;transition:all .18s;
}
.tbtn:hover{border-color:var(--cyan);color:var(--cyan);}
.tbtn.accent{border-color:var(--cyan);color:var(--cyan);}
.tbtn.accent:hover{background:rgba(0,229,255,.08);}

/* ─── BOTTOM BAR ─────────────────────────────────────────── */
#bottombar{
  position:absolute;bottom:0;left:0;right:0;z-index:40;
  display:flex;align-items:stretch;
  background:linear-gradient(0deg,rgba(10,10,14,0.98) 70%,transparent);
  border-top:1px solid var(--border);
}

/* War Room search */
#warroom{
  flex:1;display:flex;align-items:center;gap:10px;padding:10px 20px;
  border-right:1px solid var(--border);
}
.wr-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
#wr-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--cyan);font-family:var(--mono);font-size:11px;letter-spacing:.04em;
}
#wr-input::placeholder{color:var(--text3);}
.wr-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 4px;transition:color .15s;}
.wr-clear:hover{color:var(--magenta);}

/* Pathfinder */
#pathfinder{
  display:flex;align-items:center;gap:8px;padding:10px 20px;
  border-right:1px solid var(--border);
}
.pf-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
.pf-select{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:4px;padding:4px 8px;color:var(--text2);
  font-family:var(--mono);font-size:9px;outline:none;cursor:pointer;
}
.pf-select:focus{border-color:var(--magenta);}
#pf-run{
  padding:5px 12px;border-radius:4px;border:1px solid var(--magenta);
  background:rgba(255,0,200,.08);color:var(--magenta);font-family:var(--mono);
  font-size:9px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;
  transition:all .18s;white-space:nowrap;
}
#pf-run:hover{background:rgba(255,0,200,.18);}
#pf-clear{
  padding:5px 8px;border-radius:4px;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-family:var(--mono);
  font-size:9px;cursor:pointer;transition:all .15s;
}
#pf-clear:hover{color:var(--text2);}

/* Stats strip */
#stats-strip{display:flex;align-items:center;gap:16px;padding:10px 20px;}
.stat-item{text-align:center;}
.stat-n{font-size:18px;font-weight:300;color:var(--text);line-height:1;font-family:var(--mono);}
.stat-l{font-size:7px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;font-family:var(--mono);}

/* ─── RIGHT PANEL ────────────────────────────────────────── */
#rpanel{
  width:0;overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1);
  background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;z-index:30;flex-shrink:0;
}
#rpanel.open{width:300px;}
#rp-scroll{padding:20px;overflow-y:auto;height:100%;scrollbar-width:thin;scrollbar-color:#1a1a2e transparent;}
.rp-close{position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--border);
  color:var(--text3);width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;}
.rp-close:hover{border-color:var(--border2);color:var(--text);}
.rp-cat{display:inline-block;padding:2px 8px;border-radius:10px;font-size:8px;
  font-family:var(--mono);letter-spacing:.1em;margin-bottom:10px;text-transform:uppercase;border:1px solid;}
.rp-name{font-size:18px;font-weight:500;line-height:1.2;margin-bottom:4px;color:var(--text);}
.rp-role{font-size:10px;color:var(--text3);margin-bottom:18px;font-family:var(--mono);line-height:1.5;}
.rp-section{margin-bottom:14px;}
.rp-stitle{font-size:8px;font-weight:600;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;
  font-family:var(--mono);margin-bottom:7px;display:flex;align-items:center;gap:8px;}
.rp-stitle::after{content:'';flex:1;height:1px;background:var(--border);}
.rp-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.rp-key{font-size:9px;color:var(--text3);font-family:var(--mono);}
.rp-val{font-size:9px;color:var(--text2);font-family:var(--mono);text-align:right;max-width:160px;word-break:break-word;line-height:1.4;}
.score-bar{height:2px;background:var(--surface3);margin-top:5px;border-radius:1px;overflow:hidden;}
.score-fill{height:100%;border-radius:1px;transition:width .6s;}
.rp-text{font-size:9px;color:var(--text2);font-family:var(--mono);line-height:1.65;}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.tag{padding:2px 7px;border-radius:8px;font-size:8px;font-family:var(--mono);
  border:1px solid;letter-spacing:.04em;}
.cold-warn{padding:8px 10px;border-radius:4px;margin-bottom:10px;
  background:rgba(255,0,200,.06);border:1px solid rgba(255,0,200,.2);
  font-size:8.5px;color:var(--magenta);font-family:var(--mono);line-height:1.5;}
.hot-ok{padding:8px 10px;border-radius:4px;margin-bottom:10px;
  background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.18);
  font-size:8.5px;color:var(--green);font-family:var(--mono);}
.rp-btn{width:100%;padding:8px;border-radius:4px;border:1px solid var(--border2);background:transparent;
  color:var(--text2);font-size:9px;cursor:pointer;font-family:var(--mono);text-transform:uppercase;
  letter-spacing:.1em;transition:all .18s;margin-top:5px;}
.rp-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.05);}

/* ─── GOAL PANEL ────────────────────────────────────────── */
#gpanel{
  position:absolute;top:52px;right:0;z-index:35;width:228px;
  background:var(--surface);border-left:1px solid var(--border);
  height:calc(100vh - 52px);display:flex;flex-direction:column;
  transition:right .3s cubic-bezier(.4,0,.2,1);
}
#gpanel.sh{right:300px;}
.gp-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.gp-title{font-size:8px;font-weight:600;letter-spacing:.18em;color:var(--text3);font-family:var(--mono);text-transform:uppercase;}
.gp-toggle{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;font-family:var(--mono);transition:color .15s;}
.gp-toggle:hover{color:var(--text);}
#glist{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:#1a1a2e transparent;}
.gi{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.gi:hover{background:var(--surface2);}
.gi.sel{background:var(--surface2);border-left:2px solid var(--gold);padding-left:12px;}
.gi-code{font-size:7.5px;font-family:var(--mono);color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.gi-text{font-size:9px;color:var(--text2);margin-top:2px;font-family:var(--mono);line-height:1.4;}
.gi-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
.gi-chip{padding:2px 6px;border-radius:6px;font-size:7.5px;font-family:var(--mono);}

/* ─── CLOCK + VER ────────────────────────────────────────── */
#clock{position:absolute;top:62px;left:20px;z-index:20;font-family:var(--mono);font-size:8.5px;color:var(--text3);letter-spacing:.08em;}
#ver{position:absolute;top:62px;right:20px;z-index:20;font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.06em;text-align:right;}

/* ─── TOOLTIP ────────────────────────────────────────────── */
#tooltip{
  position:absolute;pointer-events:none;z-index:80;
  background:rgba(10,10,14,.96);border:1px solid var(--border2);
  border-radius:6px;padding:8px 12px;font-family:var(--mono);
  font-size:9px;color:var(--text2);opacity:0;transition:opacity .15s;
  max-width:200px;line-height:1.55;white-space:normal;
}

/* ─── PATH LEGEND ────────────────────────────────────────── */
#path-legend{
  position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:40;
  background:rgba(10,10,14,.95);border:1px solid var(--magenta);border-radius:6px;
  padding:8px 16px;font-family:var(--mono);font-size:9px;color:var(--magenta);
  letter-spacing:.06em;display:none;text-align:center;
  box-shadow:0 0 20px rgba(255,0,200,.2);
}

/* ─── ZOOM CONTROLS ─────────────────────────────────────── */
#zoom-ctrl{position:absolute;bottom:70px;left:20px;z-index:40;display:flex;flex-direction:column;gap:2px;}
.zcb{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);transition:all .15s;user-select:none;}
.zcb:hover{border-color:var(--border2);color:var(--text);}
#zoom-pct{font-family:var(--mono);font-size:8px;color:var(--text3);text-align:center;padding:3px 0;}

/* ─── SVG DEFS ───────────────────────────────────────────── */
.link-path{stroke-width:.5px;fill:none;stroke-opacity:.15;}
.node-circle{stroke-width:1.8px;}
.node-glow{fill-opacity:.08;stroke:none;}
.label-text{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:400;fill:white;pointer-events:none;text-shadow:0 0 8px rgba(0,0,0,1);}

/* PATH PULSE ANIMATION */
@keyframes pathpulse{
  0%{stroke-dashoffset:1000;opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{stroke-dashoffset:0;opacity:0;}
}
.path-animated{
  stroke-dasharray:8 6;stroke-dashoffset:1000;stroke-width:2.5px;fill:none;
  animation:pathpulse 2.4s ease-in-out infinite;filter:url(#glow-magenta);
}

</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-title">AK / Network Intelligence</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-sub" id="loader-sub">Initialising force simulation...</div>
</div>

<div id="app">
  <div id="canvas-area">
    <svg id="main-svg">
      <defs>
        <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00E5FF" flood-opacity="0.8"/>
          <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#00E5FF" flood-opacity="0.5"/>
        </filter>
        <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FF00C8" flood-opacity="0.9"/>
          <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FF00C8" flood-opacity="0.6"/>
        </filter>
        <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FFD700" flood-opacity="0.8"/>
        </filter>
        <filter id="glow-electric" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4D79FF" flood-opacity="0.8"/>
        </filter>
        <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00FF88" flood-opacity="0.8"/>
        </filter>
        <filter id="glow-node" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <!-- Gradient defs will be created dynamically in JS -->
        <marker id="arrow-magenta" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M1 1L7 4L1 7" fill="none" stroke="#FF00C8" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
      </defs>
      <!-- g elements populated by D3 -->
      <g id="g-links"></g>
      <g id="g-path-overlay"></g>
      <g id="g-nodes"></g>
    </svg>

    <!-- UI OVERLAYS -->
    <div id="topbar">
      <div class="logo">AK<span>/</span>Net</div>
      <div id="filter-pills">
        <button class="fpill on" data-cat="all">All</button>
        <button class="fpill" data-cat="us">US Clinical</button>
        <button class="fpill" data-cat="am">AMPATH</button>
        <button class="fpill" data-cat="kb">Kenya Biz</button>
        <button class="fpill" data-cat="iv">Investors</button>
        <button class="fpill" data-cat="co">Core</button>
        <button class="fpill" data-cat="po">Politics</button>
      </div>
      <div id="top-right">
        <button class="tbtn accent" onclick="toggleGoalPanel()">◈ Goals</button>
        <button class="tbtn" onclick="resetSim()">⊡ Reset</button>
        <button class="tbtn" onclick="document.getElementById('rpanel').classList.remove('open');document.getElementById('gpanel').classList.remove('sh')">✕ Close</button>
      </div>
    </div>

    <div id="clock"></div>
    <div id="ver">embedded data · v2.0</div>

    <div id="bottombar">
      <div id="warroom">
        <span class="wr-label">⚡ War Room</span>
        <input id="wr-input" type="text" placeholder="Search tag, org, or scenario...">
        <button class="wr-clear" onclick="clearWarroom()" title="Clear">✕</button>
      </div>
      <div id="pathfinder">
        <span class="pf-label">⟶ Path</span>
        <select id="pf-from" class="pf-select"><option value="">From...</option></select>
        <select id="pf-to" class="pf-select"><option value="">To...</option></select>
        <button id="pf-run" onclick="runPathfinder()">Find</button>
        <button id="pf-clear" onclick="clearPath()">✕</button>
      </div>
      <div id="stats-strip">
        <div class="stat-item"><div class="stat-n" id="sn-total">0</div><div class="stat-l">Contacts</div></div>
        <div class="stat-item"><div class="stat-n" id="sn-cold" style="color:var(--magenta)">0</div><div class="stat-l">Cold</div></div>
        <div class="stat-item"><div class="stat-n" id="sn-links">0</div><div class="stat-l">Links</div></div>
      </div>
    </div>

    <div id="path-legend"></div>

    <div id="zoom-ctrl">
      <div class="zcb" onclick="zoomBy(1.2)">+</div>
      <div id="zoom-pct">100%</div>
      <div class="zcb" onclick="zoomBy(.83)">−</div>
    </div>

    <div id="tooltip"></div>
  </div>

  <!-- GOAL PANEL -->
  <div id="gpanel">
    <div class="gp-hdr">
      <span class="gp-title">◈ Goal Matcher</span>
      <button class="gp-toggle" onclick="toggleGoalPanel()">−</button>
    </div>
    <div id="glist"></div>
  </div>

  <!-- RIGHT DETAIL PANEL -->
  <div id="rpanel">
    <div id="rp-scroll">
      <button class="rp-close" onclick="closeRPanel()">✕</button>
      <div id="rp-content"></div>
    </div>
  </div>
</div>

<!-- D3 v7 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════

  {id:"n2",name:"Dr. Jennifer Nguyen",role:"Cardiologist — KP LA",cat:"us",score:6,daysSince:190,goals:["C3","C7","C13"],tags:["Kaiser Permanente","Cardiology","TEE"],knows:["n1","n3","n4","n6"]},

  {id:"n4",name:"Dr. Howard",role:"CCU Cardiologist — KP",cat:"us",score:6,daysSince:173,goals:["C3","C7","C13"],tags:["Kaiser Permanente","CCU","Case Presentation"],knows:["n3","n5"]},

// ═══════════════════════════════════════════════════════════════
//  RADIUS + WEIGHT
// ═══════════════════════════════════════════════════════════════
function strategicWeight(d){
  // Base: goal count * score, penalised by days since contact
  const base = (d.goals.length * 1.5) + (d.score * 0.8);
  const penalty = Math.min(1, d.daysSince / 200); // 0→1 as days 0→200
  return Math.max(0.3, base * (1 - penalty * 0.5));
}
function nodeRadius(d){
  return 10 + strategicWeight(d) * 2.2;
}

// ═══════════════════════════════════════════════════════════════
//  RELATIONSHIP GRAVITY FORCE
//  Neglected contacts drift outward; active ones stay central
// ═══════════════════════════════════════════════════════════════
function gravityForce(alpha){
  const cx = svgEl ? +svgEl.getAttribute("width") / 2 : 600;
  const cy = svgEl ? +svgEl.getAttribute("height") / 2 : 400;
  NODES.forEach(d=>{
    if(!d.x) return;
    // gravityStrength: 0.05 for fresh, down to 0.005 for 200+ days old
    const gravStr = Math.max(0.005, 0.06 * (1 - Math.min(1, d.daysSince / 180)));
    d.vx += (cx - d.x) * gravStr * alpha;
    d.vy += (cy - d.y) * gravStr * alpha;
  });
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function init(){
  document.getElementById("loader-sub").textContent = "Building graph...";

  const svg = d3.select("#main-svg");
  svgEl = document.getElementById("main-svg");

  const W = svgEl.clientWidth || window.innerWidth;
  const H = svgEl.clientHeight || window.innerHeight;

  // Dynamic gradient defs for each link
  const defs = svg.select("defs");
  LINKS_RAW.forEach((l,i)=>{
    const sc = CAT_COLOR[nodeMap.get(l.source)?.cat] || "#fff";
    const tc = CAT_COLOR[nodeMap.get(l.target)?.cat] || "#fff";
    defs.append("linearGradient")
      .attr("id",`lg-${i}`)
      .attr("gradientUnits","userSpaceOnUse")
      .call(g=>{
        g.append("stop").attr("offset","0%").attr("stop-color",sc).attr("stop-opacity",1);
        g.append("stop").attr("offset","100%").attr("stop-color",tc).attr("stop-opacity",1);
      });
  });

  gLinks = d3.select("#g-links");
  gPathOverlay = d3.select("#g-path-overlay");
  gNodes = d3.select("#g-nodes");

  // Build link data with references
  const links = LINKS_RAW.map((l,i)=>({...l, index:i, sourceNode:nodeMap.get(l.source), targetNode:nodeMap.get(l.target)}));

  // FORCE SIMULATION
  simulation = d3.forceSimulation(NODES)
    .force("link", d3.forceLink(links).id(d=>d.id)
      .distance(d => {
        // Stronger links pull closer
        const base = 100;
        return base + (3 - Math.min(3,d.weight)) * 30;
      })
      .strength(d => Math.min(0.6, d.weight * 0.18))
    )
    .force("charge", d3.forceManyBody()
      .strength(d => -220 - (d.score||5)*8)
    )
    .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 14))
    .force("center", d3.forceCenter(W/2, H/2).strength(0.04))
    .force("gravity", gravityForce)
    .alphaDecay(0.018)
    .velocityDecay(0.38);

  // ── DRAW LINKS
  const linkSel = gLinks.selectAll(".link-path")
    .data(links).enter()
    .append("path")
    .attr("class","link-path")
    .attr("stroke", (d,i) => `url(#lg-${i})`)
    .attr("stroke-opacity", .15);

  // ── DRAW NODES
  const nodeSel = gNodes.selectAll(".node-g")
    .data(NODES).enter()
    .append("g")
    .attr("class","node-g")
    .style("cursor","pointer")
    .call(d3.drag()
      .on("start",(event,d)=>{if(!event.active)simulation.alphaTarget(.15).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(event,d)=>{d.fx=event.x;d.fy=event.y;})
      .on("end",(event,d)=>{if(!event.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;})
    )
    .on("mouseenter", (event,d) => hoverNode(d, event))
    .on("mouseleave", () => unhoverNode())
    .on("click", (event,d) => { event.stopPropagation(); selectNode(d); });

  // Outer glow ring (extra large, very low opacity)
  nodeSel.append("circle")
    .attr("class","node-glow")
    .attr("r", d => nodeRadius(d) + 8)
    .attr("fill", d => CAT_COLOR[d.cat] || "#fff")
    .attr("fill-opacity", 0.04);

  // Main hollow circle
  nodeSel.append("circle")
    .attr("class","node-circle")
    .attr("r", d => nodeRadius(d))
    .attr("fill", d => CAT_COLOR[d.cat] || "#fff")
    .attr("fill-opacity", 0.07)
    .attr("stroke", d => CAT_COLOR[d.cat] || "#fff")
    .attr("stroke-opacity", 0.85)
    .attr("filter", d => `url(#${CAT_GLOW[d.cat]||"glow-cyan"})`);

  // Inner accent dot
  nodeSel.append("circle")
    .attr("class","node-inner")
    .attr("r", 2.5)
    .attr("fill", d => CAT_COLOR[d.cat] || "#fff")
    .attr("fill-opacity", 0.6);

  // Label
  nodeSel.append("text")
    .attr("class","label-text")
    .attr("dy", d => nodeRadius(d) + 14)
    .attr("text-anchor","middle")
    .attr("font-size", d => Math.max(8, Math.min(10, nodeRadius(d) * 0.55))+"px")
    .text(d => {
      const parts = d.name.split(" ");
      return parts.length <= 2 ? d.name : parts.slice(0,2).join(" ");
    });

  // ZOOM
  zoomBehavior = d3.zoom()
    .scaleExtent([0.1, 5])
    .on("zoom", (event) => {
      transform = event.transform;
      d3.select("#g-links").attr("transform", transform);
      d3.select("#g-nodes").attr("transform", transform);
      d3.select("#g-path-overlay").attr("transform", transform);
      document.getElementById("zoom-pct").textContent = Math.round(transform.k * 100) + "%";
    });
  svg.call(zoomBehavior);
  svg.on("click", () => { deselectNode(); });

  // TICK
  simulation.on("tick", () => {
    // Curved bezier links
    linkSel.attr("d", d => {
      const sx = d.source.x, sy = d.source.y;
      const tx = d.target.x, ty = d.target.y;
      const dx = tx - sx, dy = ty - sy;
      const dr = Math.sqrt(dx*dx + dy*dy);
      // Curvature: stronger links = less curve
      const curve = Math.max(0.3, 1 - d.weight * 0.15);
      const midX = (sx+tx)/2 - dy * curve * 0.3;
      const midY = (sy+ty)/2 + dx * curve * 0.3;
      return `M${sx},${sy} Q${midX},${midY} ${tx},${ty}`;
    });

    // Update gradient coords
    links.forEach((l,i)=>{
      const grad = document.getElementById(`lg-${i}`);
      if(grad){
        grad.setAttribute("x1",l.source.x);grad.setAttribute("y1",l.source.y);
        grad.setAttribute("x2",l.target.x);grad.setAttribute("y2",l.target.y);
      }
    });

    // Update gradient x1/y1/x2/y2 live
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // Populate pathfinder selects
  const pf1 = document.getElementById("pf-from");
  const pf2 = document.getElementById("pf-to");
  NODES.forEach(n=>{
    [pf1,pf2].forEach(sel=>{
      const opt = document.createElement("option");
      opt.value = n.id; opt.textContent = n.name.split(" ").slice(0,2).join(" ");
      sel.appendChild(opt);
    });
  });

  // Stats
  document.getElementById("sn-total").textContent = NODES.length;
  document.getElementById("sn-cold").textContent = NODES.filter(n=>n.daysSince>30).length;
  document.getElementById("sn-links").textContent = LINKS_RAW.length;

  renderGoals();
  buildLinkIndex(links);

  // Show
  setTimeout(()=>{
    document.getElementById("loader").style.opacity = "0";
    setTimeout(()=>{document.getElementById("loader").style.display="none";},500);
    document.getElementById("app").classList.add("ready");
  }, 900);
}

// ═══════════════════════════════════════════════════════════════
//  LINK INDEX (adjacency)
// ═══════════════════════════════════════════════════════════════
let adjacency = {}; // nodeId -> Set of nodeIds
let linkIndex = []; // full links array reference

function buildLinkIndex(links){
  linkIndex = links;
  NODES.forEach(n=>{ adjacency[n.id] = new Set(); });
  links.forEach(l=>{
    adjacency[l.source.id]?.add(l.target.id);
    adjacency[l.target.id]?.add(l.source.id);
  });
}

// ═══════════════════════════════════════════════════════════════
//  HOVER
// ═══════════════════════════════════════════════════════════════
function hoverNode(d, event){
  if(selectedNode) return; // panel open = no hover dim
  hoveredNode = d;
  const connected = adjacency[d.id] || new Set();

  d3.selectAll(".node-g").each(function(nd){
    const isThis = nd.id === d.id;
    const isConn = connected.has(nd.id);
    const op = isThis||isConn ? 1 : 0.05;
    d3.select(this).transition().duration(180)
      .style("opacity", op);
    if(isThis){
      d3.select(this).select(".node-circle")
        .transition().duration(180)
        .attr("stroke-width", 2.8)
        .attr("fill-opacity", 0.18);
    }
  });

  d3.selectAll(".link-path").each(function(l){
    const conn = (l.source.id===d.id||l.target.id===d.id);
    d3.select(this).transition().duration(180)
      .attr("stroke-opacity", conn ? 0.7 : 0.02);
  });

  // Tooltip
  const tip = document.getElementById("tooltip");
  const asc = autoScore(d);
  tip.innerHTML = `<span style="color:${CAT_COLOR[d.cat]||'#fff'}">${d.name}</span>`+
    (d.daysSince>30?`<br><span style="color:#FF00C8">${d.daysSince}d cold</span>`:'')+
    `<br><span style="opacity:.5">${d.role}</span>`+
    `<br><span style="color:var(--gold)">Score ${asc}/10</span>`;
  tip.style.opacity = "1";
  const rect = svgEl.getBoundingClientRect();
  tip.style.left = (event.clientX - rect.left + 14) + "px";
  tip.style.top = (event.clientY - rect.top - 10) + "px";
}

function unhoverNode(){
  if(selectedNode) return;
  hoveredNode = null;
  applyVisualState();
  document.getElementById("tooltip").style.opacity = "0";
}

// ═══════════════════════════════════════════════════════════════
//  SELECT / PANEL
// ═══════════════════════════════════════════════════════════════
function selectNode(d){
  selectedNode = d;
  applyVisualState();
  openRPanel(d);
}
function deselectNode(){
  selectedNode = null;
  hoveredNode = null;
  applyVisualState();
  document.getElementById("rpanel").classList.remove("open");
  document.getElementById("gpanel").classList.remove("sh");
}
function closeRPanel(){
  selectedNode = null;
  document.getElementById("rpanel").classList.remove("open");
  document.getElementById("gpanel").classList.remove("sh");
  applyVisualState();
}

function autoScore(d){
  const age = d.daysSince;
  return Math.max(1, Math.min(10, (d.score||5) - (age>30?3:age>14?1:0)));
}

// ═══════════════════════════════════════════════════════════════
//  APPLY VISUAL STATE
//  Single source of truth for all node/link opacities
// ═══════════════════════════════════════════════════════════════
function applyVisualState(){
  const focusNode = selectedNode || hoveredNode;
  const inPath = pathNodes;
  const inWarroom = wrActive;

  d3.selectAll(".node-g").each(function(nd){
    let op = 1;
    if(focusNode){
      const connected = adjacency[focusNode.id]||new Set();
      op = (nd.id===focusNode.id||connected.has(nd.id)) ? 1 : 0.05;
    } else if(inWarroom){
      op = matchesWarroom(nd) ? 1 : 0.04;
    } else if(filteredCat !== "all"){
      op = nd.cat === filteredCat ? 1 : 0.06;
    } else if(inPath){
      op = inPath.has(nd.id) ? 1 : 0.04;
    }
    d3.select(this).transition().duration(200).style("opacity", op);

    // Border thickness based on focus
    const thick = focusNode && (nd.id===focusNode.id||((adjacency[focusNode.id]||new Set()).has(nd.id)));
    d3.select(this).select(".node-circle")
      .transition().duration(200)
      .attr("stroke-width", thick ? 2.8 : 1.8)
      .attr("fill-opacity", thick ? 0.16 : 0.07);
  });

  d3.selectAll(".link-path").each(function(l){
    let op = .15;
    if(focusNode){
      const conn = (l.source.id===focusNode.id||l.target.id===focusNode.id);
      op = conn ? 0.65 : 0.02;
    } else if(inWarroom){
      const conn = matchesWarroom(l.source)&&matchesWarroom(l.target);
      op = conn ? 0.4 : 0.02;
    } else if(filteredCat !== "all"){
      const cat = (l.source.cat===filteredCat&&l.target.cat===filteredCat);
      op = cat ? 0.35 : 0.02;
    } else if(inPath){
      const onPath = pathEdges && pathEdges.has(`${l.source.id}-${l.target.id}`) || pathEdges?.has(`${l.target.id}-${l.source.id}`);
      op = onPath ? 0 : 0.02; // hidden — path-overlay handles it
    }
    d3.select(this).transition().duration(200).attr("stroke-opacity", op);
  });
}

    <div class="rp-section">
      <div class="rp-stitle">Connections (${conns.length})</div>
      ${conns.map(c=>`<div style="padding:6px 0;border-bottom:1px solid var(--border)"><div class="rp-row"><span class="rp-key" style="color:${CAT_COLOR[c.cat]||"#fff"}">${c.name}</span></div><div class="rp-text">${c.role}</div></div>`).join("")}
    </div>
    <button class="rp-btn" onclick="markContacted('${d.id}')">Mark Contacted Today</button>
    <button class="rp-btn" style="margin-top:4px;border-color:var(--magenta);color:var(--magenta)" onclick="findPathFrom('${d.id}')">⟶ Find Path From Here</button>
  `;
  document.getElementById("rpanel").classList.add("open");
  document.getElementById("gpanel").classList.add("sh");
}

function markContacted(id){
  const n = nodeMap.get(id);
  if(!n) return;
  n.daysSince = 0;
  // Restart sim slightly to update gravity
  simulation.alpha(0.1).restart();
  if(selectedNode?.id === id) openRPanel(n);
  document.getElementById("sn-cold").textContent = NODES.filter(n=>n.daysSince>30).length;
}

function findPathFrom(id){
  document.getElementById("pf-from").value = id;
  closeRPanel();
}

// ═══════════════════════════════════════════════════════════════
//  WAR ROOM
// ═══════════════════════════════════════════════════════════════
function matchesWarroom(d){
  if(!wrQuery) return true;
  const q = wrQuery.toLowerCase();
  return d.name.toLowerCase().includes(q) ||
         d.role.toLowerCase().includes(q) ||
         (d.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
         (d.goals||[]).some(g=>g.toLowerCase().includes(q)) ||
         (CAT_LABEL[d.cat]||"").toLowerCase().includes(q);
}

document.getElementById("wr-input").addEventListener("input", function(){
  wrQuery = this.value.trim();
  wrActive = wrQuery.length > 0;
  pathNodes = null; pathEdges = null;
  clearPathOverlay();

  if(wrActive){
    // Move matching nodes to center, push non-matching to edges
    const matches = NODES.filter(matchesWarroom);
    const nonMatches = NODES.filter(n=>!matchesWarroom(n));
    const W = svgEl.clientWidth, H = svgEl.clientHeight;
    const cx = W/2, cy = H/2;

    matches.forEach(n=>{
      n.fx = cx + (Math.random()-.5)*80;
      n.fy = cy + (Math.random()-.5)*80;
    });
    nonMatches.forEach(n=>{
      const angle = Math.random()*Math.PI*2;
      const r = Math.min(W,H)*0.46;
      n.fx = cx + Math.cos(angle)*r;
      n.fy = cy + Math.sin(angle)*r;
    });
    simulation.alpha(0.8).restart();

    setTimeout(()=>{
      matches.forEach(n=>{n.fx=null;n.fy=null;});
      nonMatches.forEach(n=>{n.fx=null;n.fy=null;});
    }, 1400);
  } else {
    // Release all
    NODES.forEach(n=>{n.fx=null;n.fy=null;});
    simulation.alpha(0.3).restart();
  }

  applyVisualState();
});

function clearWarroom(){
  document.getElementById("wr-input").value = "";
  wrQuery = ""; wrActive = false;
  NODES.forEach(n=>{n.fx=null;n.fy=null;});
  simulation.alpha(0.3).restart();
  applyVisualState();
}

// ═══════════════════════════════════════════════════════════════
//  PATHFINDER (Dijkstra's)
// ═══════════════════════════════════════════════════════════════
function dijkstra(startId, endId){
  const dist = {}, prev = {};
  const unvisited = new Set(NODES.map(n=>n.id));
  NODES.forEach(n=>{ dist[n.id] = Infinity; });
  dist[startId] = 0;

  while(unvisited.size > 0){
    // Find min dist unvisited
    let u = null, minD = Infinity;
    unvisited.forEach(id=>{ if(dist[id] < minD){ minD=dist[id]; u=id; } });
    if(!u || u === endId) break;
    unvisited.delete(u);

    // Find neighbours via links
    linkIndex.forEach(l=>{
      const sId = l.source.id||l.source, tId = l.target.id||l.target;
      let neighbor = null;
      if(sId === u) neighbor = tId;
      else if(tId === u) neighbor = sId;
      if(!neighbor || !unvisited.has(neighbor)) return;
      const alt = dist[u] + (4 - Math.min(3, l.weight)); // lower weight = longer
      if(alt < dist[neighbor]){ dist[neighbor]=alt; prev[neighbor]=u; }
    });
  }

  // Reconstruct path
  const path = [];
  let cur = endId;
  while(cur){ path.unshift(cur); cur = prev[cur]; }
  if(path[0] !== startId) return null; // no path
  return path;
}

function runPathfinder(){
  const from = document.getElementById("pf-from").value;
  const to = document.getElementById("pf-to").value;
  if(!from||!to||from===to) return;

  const path = dijkstra(from, to);
  if(!path||path.length<2){
    document.getElementById("path-legend").textContent="No path found between these contacts.";
    document.getElementById("path-legend").style.display="block";
    return;
  }

  pathNodes = new Set(path);
  pathEdges = new Set();
  for(let i=0;i<path.length-1;i++){
    pathEdges.add(`${path[i]}-${path[i+1]}`);
    pathEdges.add(`${path[i+1]}-${path[i]}`);
  }

  applyVisualState();
  drawPathOverlay(path);

  const names = path.map(id=>nodeMap.get(id)?.name.split(" ")[0]).join(" → ");
  document.getElementById("path-legend").innerHTML = `⟶ &nbsp;${names}&nbsp; (${path.length-1} hop${path.length>2?"s":""})`;
  document.getElementById("path-legend").style.display = "block";
}

function drawPathOverlay(path){
  clearPathOverlay();
  for(let i=0;i<path.length-1;i++){
    const s = nodeMap.get(path[i]);
    const t = nodeMap.get(path[i+1]);
    if(!s||!t) continue;

    // Find the actual link data for curved path
    const ldata = linkIndex.find(l=>(l.source.id===s.id&&l.target.id===t.id)||(l.source.id===t.id&&l.target.id===s.id));

    gPathOverlay.append("path")
      .attr("class","path-animated")
      .attr("stroke","#FF00C8")
      .attr("d", ()=>{
        if(!s.x) return "";
        const dx=t.x-s.x, dy=t.y-s.y;
        const curve = ldata ? Math.max(0.3,1-ldata.weight*0.15) : 0.5;
        const midX=(s.x+t.x)/2-dy*curve*0.3;
        const midY=(s.y+t.y)/2+dx*curve*0.3;
        return `M${s.x},${s.y} Q${midX},${midY} ${t.x},${t.y}`;
      })
      .style("animation-delay", `${i * 0.22}s`);
  }
  // Update path overlay positions on tick
}

function clearPathOverlay(){
  gPathOverlay.selectAll("*").remove();
}

function clearPath(){
  pathNodes=null; pathEdges=null;
  clearPathOverlay();
  document.getElementById("path-legend").style.display="none";
  document.getElementById("pf-from").value="";
  document.getElementById("pf-to").value="";
  applyVisualState();
}

// ═══════════════════════════════════════════════════════════════
//  FILTER PILLS
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll(".fpill").forEach(p=>{
  p.onclick=()=>{
    document.querySelectorAll(".fpill").forEach(x=>x.classList.remove("on"));
    p.classList.add("on");
    filteredCat = p.dataset.cat;
    pathNodes=null;pathEdges=null;clearPathOverlay();
    wrActive=false;document.getElementById("wr-input").value="";wrQuery="";
    applyVisualState();
  };
});

// ═══════════════════════════════════════════════════════════════
//  GOALS PANEL
// ═══════════════════════════════════════════════════════════════
let gpOpen = true;
function toggleGoalPanel(){
  gpOpen = !gpOpen;
  const gl = document.getElementById("glist");
  const btn = document.querySelector(".gp-toggle");
  gl.style.display = gpOpen ? "" : "none";
  btn.textContent = gpOpen ? "−" : "+";
}
function renderGoals(){
  const gl = document.getElementById("glist");
  gl.innerHTML = "";
  GOALS_LIST.forEach(g=>{
    const ms = NODES.filter(n=>n.goals.includes(g.code));
    const el = document.createElement("div");
    el.className = "gi" + (selGoal===g.code?" sel":"");
    el.onclick=()=>{
      selGoal = selGoal===g.code?null:g.code;
      renderGoals();
      if(selGoal){
        // Highlight matching nodes
        const matching = new Set(NODES.filter(n=>n.goals.includes(selGoal)).map(n=>n.id));
        d3.selectAll(".node-g").transition().duration(200)
          .style("opacity", nd => matching.has(nd.id)?1:0.05);
        d3.selectAll(".link-path").transition().duration(200)
          .attr("stroke-opacity", l=>(matching.has(l.source.id)&&matching.has(l.target.id))?.25:.02);
      } else {
        applyVisualState();
      }
    };
    const chips = ms.length ? ms.slice(0,3).map(m=>{
      const asc=autoScore(m);
      const col=asc>=7?"rgba(0,255,136,.18)":asc>=4?"rgba(255,215,0,.18)":"rgba(255,0,200,.18)";
      const fc=asc>=7?"#00FF88":asc>=4?"#FFD700":"#FF00C8";
      return `<span class="gi-chip" style="background:${col};color:${fc}">${m.name.split(" ")[0]} ${asc}/10</span>`;
    }).join("") : `<span class="gi-chip" style="background:rgba(255,0,200,.1);color:#FF00C8">No contacts</span>`;
    el.innerHTML = `<div class="gi-code">${g.code} · ${g.domain}</div><div class="gi-text">${g.text}</div><div class="gi-chips">${chips}</div>`;
    gl.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════════════════════
function zoomBy(factor){
  const svg = d3.select("#main-svg");
  svg.transition().duration(280).call(zoomBehavior.scaleBy, factor);
}
function resetSim(){
  NODES.forEach(n=>{n.fx=null;n.fy=null;});
  simulation.alpha(0.5).restart();
  clearWarroom();
  clearPath();
  filteredCat="all";
  document.querySelectorAll(".fpill").forEach(p=>{p.classList.remove("on");if(p.dataset.cat==="all")p.classList.add("on");});
  d3.select("#main-svg").transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
  applyVisualState();
}

// ═══════════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════════
function clkTick(){
  const n = new Date();
  document.getElementById("clock").textContent =
    n.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}).toUpperCase()+
    "  /  "+n.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
setInterval(clkTick,1000); clkTick();

window.addEventListener("resize", ()=>{
  const W = svgEl.clientWidth, H = svgEl.clientHeight;
  simulation.force("center", d3.forceCenter(W/2,H/2).strength(0.04));
  simulation.alpha(0.1).restart();
});
